name: UI system healthcheck

on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: Environment URL to check
        required: true
        default: https://stg-ui.adcint.com
        type: string
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

concurrency:
  group: ui-healthcheck-${{ github.ref }}
  cancel-in-progress: false

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ENVIRONMENT_URL: ${{ inputs.environment_url || 'https://stg-ui.adcint.com' }}
      LOGIN: ${{ secrets.HEALTHCHECK_LOGIN }}
      PASSWORD: ${{ secrets.HEALTHCHECK_PASSWORD }}
      HEADLESS: "true"
      SLOW_MO_MS: "0"
      ACTION_TIMEOUT_MS: "20000"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Compile tests
        run: mvn --batch-mode test-compile

      - name: Install Chromium and system dependencies
        run: >-
          mvn --batch-mode exec:java
          -Dexec.classpathScope=test
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps chromium"

      - name: Run UI healthcheck
        run: mvn --batch-mode test

      - name: Generate HTML report
        if: always()
        run: mvn --batch-mode surefire-report:report-only

      - name: Upload reports and failure diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-healthcheck-${{ github.run_id }}
          path: |
            target/surefire-reports/
            target/reports/
            artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: Send failure notification
        if: failure()
        env:
          FAILURE_WEBHOOK_URL: ${{ secrets.FAILURE_WEBHOOK_URL }}
        run: |
          if [ -z "$FAILURE_WEBHOOK_URL" ]; then
            echo "FAILURE_WEBHOOK_URL is not configured; GitHub will still mark the run as failed."
            exit 0
          fi
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          payload=$(jq -n --arg text "UI healthcheck failed for $ENVIRONMENT_URL: $run_url" '{text: $text}')
          curl --fail --silent --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "$FAILURE_WEBHOOK_URL"
